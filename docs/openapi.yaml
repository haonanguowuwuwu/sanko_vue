          type: string

    ReaderBlock:
      type: object
      required: [id, type, text]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [paragraph, title, subtitle]
        text:
          type: string
        defaultBg:
          type: string
          enum: [gray]

    ReaderPage:
      type: object
      required: [page, blocks]
      properties:
        page:
          type: integer
        blocks:
          type: array
