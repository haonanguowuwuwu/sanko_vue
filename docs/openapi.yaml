        left:
          $ref: '#/components/schemas/ReaderPage'
        right:
          $ref: '#/components/schemas/ReaderPage'

    ReaderHighlight:
      type: object
      required:
        - id
        - bookId
        - blockId
        - spreadIndex
        - start
        - end
        - color
        - quote
        - chapter
        - createdAt
      properties:
        id:
          type: string
        bookId:
          type: string
        blockId:
          type: string
          description: 对应 ReaderBlock.id
        spreadIndex:
          type: integer
          minimum: 0
        start:
          type: integer
          description: 在 block.text 中的起始字符偏移（含）
        end:
          type: integer
          description: 在 block.text 中的结束字符偏移（不含）
        color:
          type: string
          enum: [blue, green, gray]
        quote:
          type: string
          description: 选中的原文
        chapter:
          type: string
        note:
          type: string
          description: 笔记内容（可选）
        createdAt:
          type: string
          format: date-time

    CreateAnnotationRequest:
      type: object
      required:
        - bookId
        - blockId
        - spreadIndex
        - start
        - end
        - color
        - quote
        - chapter
      properties:
        bookId:
          type: string
        blockId:
          type: string
        spreadIndex:
          type: integer
        start:
          type: integer
        end:
          type: integer
        color:
          type: string
          enum: [blue, green, gray]
        quote:
          type: string
        chapter:
          type: string
        note:
          type: string

