        spreadIndex:
          type: integer

    AppSettingsDto:
      type: object
      required:
        - disableRecycleBin
        - hideBookshelfBooks
        - directDeleteFromShelf
        - noPdfCoverAsBookCover
        - noCropBookCovers
        - showBookshelfBookCount
        - enableSoftwareProtection
      properties:
        disableRecycleBin:
          type: boolean
          description: true 时删除走永久删除，不进入回收站
        hideBookshelfBooks:
          type: boolean
          description: 首页隐藏已在书架中的书（逻辑待前端完整接入）
        directDeleteFromShelf:
          type: boolean
          description: 从书架直接删除（UI 有，逻辑待接）
        noPdfCoverAsBookCover:
          type: boolean
        noCropBookCovers:
          type: boolean
        showBookshelfBookCount:
          type: boolean
          description: 侧栏是否显示书架图书数量
        enableSoftwareProtection:
          type: boolean
          description: 启用软件保护，启动/退出需登录

    AppSettingsDtoPartial:
      type: object
      description: PATCH 时可只传需要更新的字段
      additionalProperties: false
      properties:
        disableRecycleBin:
          type: boolean
        hideBookshelfBooks:
          type: boolean
        directDeleteFromShelf:
          type: boolean
        noPdfCoverAsBookCover:
          type: boolean
        noCropBookCovers:
          type: boolean
        showBookshelfBookCount:
          type: boolean
        enableSoftwareProtection:
          type: boolean

