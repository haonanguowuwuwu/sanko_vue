        name:
          type: string
        bookIds:
          type: array
          items:
            type: string

    CreateBookshelfRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    RenameBookshelfRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    ReorderBookshelvesRequest:
      type: object
      required: [orderedIds]
      properties:
        orderedIds:
          type: array
          items:
            type: string

